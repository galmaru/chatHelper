name: Windows EXE 빌드

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  build:
    runs-on: windows-latest   # 진짜 Windows 환경

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: UPX 설치 (크기 압축용)
        run: |
          choco install upx -y --no-progress
        shell: pwsh

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller 빌드
        run: |
          pyinstaller build/build.spec --noconfirm --clean
        shell: pwsh

      - name: 빌드 결과 크기 확인
        run: |
          $file = "dist/ChatSummarizer.exe"
          if (Test-Path $file) {
            $size = (Get-Item $file).Length
            $sizeMB = [math]::Round($size / 1MB, 2)
            Write-Host "빌드 성공: ChatSummarizer.exe ($sizeMB MB)"
            if ($sizeMB -gt 50) {
              Write-Error "크기 초과: ${sizeMB}MB > 50MB 제한"
              exit 1
            }
          } else {
            Write-Error "dist/ChatSummarizer.exe 를 찾을 수 없습니다."
            exit 1
          }
        shell: pwsh

      - name: EXE 파일 업로드 (아티팩트)
        uses: actions/upload-artifact@v4
        with:
          name: ChatSummarizer-Windows
          path: dist/ChatSummarizer.exe
          retention-days: 30

      # 태그 푸시 시 GitHub Release 자동 생성
      - name: GitHub Release 생성 (태그 푸시 시)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ChatSummarizer.exe
          name: "ChatSummarizer ${{ github.ref_name }}"
          body: |
            ## ChatSummarizer ${{ github.ref_name }}

            ### 설치 방법
            1. `ChatSummarizer.exe` 다운로드
            2. 더블클릭으로 바로 실행 (설치 불필요)

            ### 요구사항
            - Windows 10 / 11 (64비트)
            - 인터넷 연결 없이도 오프라인 요약 가능
